<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PasswordProject – Téléchargement</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #f0f6fc;
    }

    .version {
      display: inline-block;
      background: #388bfd22;
      color: #58a6ff;
      border: 1px solid #388bfd55;
      border-radius: 20px;
      font-size: 0.8rem;
      padding: 2px 12px;
      margin-bottom: 1.2rem;
    }

    p.desc {
      color: #8b949e;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1.4rem;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }

    .btn-windows {
      background: #1f6feb;
      border-color: #388bfd;
      color: #ffffff;
    }

    .btn-windows:hover { background: #388bfd; }

    .btn-linux {
      background: #21262d;
      border-color: #30363d;
      color: #e6edf3;
    }

    .btn-linux:hover { background: #30363d; }

    .btn-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .btn-label { flex: 1; text-align: left; }

    .btn-meta {
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.7;
      white-space: nowrap;
    }

    footer {
      margin-top: 2.5rem;
      color: #484f58;
      font-size: 0.8rem;
    }

    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔐</div>
    <h1>PasswordProject</h1>
    <span class="version">v1.0.3</span>
    <p class="desc">
      Gestionnaire de mots de passe sécurisé.<br />
      Téléchargez la version correspondant à votre système d'exploitation.
    </p>

    <div class="buttons">
      <a class="btn btn-windows" href="download/PasswordProject_1.0.0_Setup.exe" download>
        <span class="btn-icon">🪟</span>
        <span class="btn-label">Windows<br /><small style="font-weight:400;opacity:.8;">Installateur .exe</small></span>
        <span class="btn-meta">.exe</span>
      </a>

      <a class="btn btn-linux" href="download/passwordproject_1.0.0_amd64.deb" download>
        <span class="btn-icon">🐧</span>
        <span class="btn-label">Linux (Debian / Ubuntu)<br /><small style="font-weight:400;opacity:.8;">Paquet .deb – amd64</small></span>
        <span class="btn-meta">.deb</span>
      </a>
    </div>
  </div>

  <footer>
    &copy; 2026 PasswordProject &mdash; Tous droits réservés
  </footer>
</body>
</html>
